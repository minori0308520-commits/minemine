<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine買買Mine - 專屬代購</title>
    <style>
        :root { --line-green: #06C755; --text-main: #000000; --text-sub: #8E8E93; --link-blue: #5856D6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: white; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        
        /* 驗證畫面樣式 */
        #auth-screen { display: none; flex-direction: column; padding: 40px 24px; min-height: 100vh; box-sizing: border-box; }
        .header-title { font-size: 32px; font-weight: bold; margin: 0; color: var(--text-main); }
        .header-desc { font-size: 18px; color: var(--text-sub); margin: 16px 0 32px 0; }
        .code-label { font-size: 16px; color: var(--text-sub); margin-bottom: 8px; }
        .code-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
        .code-number { font-size: 28px; font-weight: 500; letter-spacing: 2px; color: var(--link-blue); border: 1px dashed #ccc; padding: 12px; border-radius: 8px; background: #fdfdfd; }
        .step-item { display: flex; margin-bottom: 32px; align-items: flex-start; }
        .step-num { font-size: 20px; font-weight: bold; margin-right: 12px; color: var(--text-main); line-height: 1; margin-top: 4px; }
        .step-content b { font-size: 20px; display: block; margin-bottom: 6px; color: var(--text-main); }
        .step-content p { font-size: 16px; color: var(--text-sub); margin: 0; line-height: 1.4; }
        .tip-text { color: #EBB000; font-size: 15px; margin-top: 8px !important; display: flex; align-items: center; gap: 4px; }
        .line-button { background: var(--line-green); color: white; width: 100%; padding: 18px; border-radius: 12px; text-align: center; text-decoration: none; font-size: 18px; font-weight: bold; border: none; margin-top: auto; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(6,199,85,0.2); }

        /* 商品前台樣式 */
        #store-screen { display: none; max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; }
        .product-img { width: 100%; aspect-ratio: 1/1; background: #f5f5f5; object-fit: cover; }
        .product-content { padding: 24px; }
        .price { color: #d0021b; font-size: 30px; font-weight: bold; margin: 15px 0; font-family: 'Avenir', sans-serif; }
        .buy-now { display: block; width: 100%; background: #000; color: white; text-align: center; padding: 18px; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 18px; border: none; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        
        #loading { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-size: 16px; color: #999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--link-blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    讀取 Mine買買Mine 商品資料...
</div>

<div id="auth-screen">
    <h1 class="header-title">帳號驗證</h1>
    <p class="header-desc">為確保您的帳號安全，請完成以下驗證步驟</p>
    
    <div class="code-label">您的驗證碼</div>
    <div class="code-row">
        <div class="code-number" id="displayCode">------</div>
        <div style="color:var(--link-blue); font-weight: bold; cursor:pointer; font-size: 16px;" onclick="copyCode()">複製驗證碼</div>
    </div>

    <div class="step-item">
        <span class="step-num">1</span>
        <div class="step-content"><b>點擊下方按鈕</b><p>前往官方 LINE 帳號</p></div>
    </div>

    <div class="step-item">
        <span class="step-num">2</span>
        <div class="step-content">
            <b>私訊輸入驗證碼</b>
            <p>將上方的六位驗證碼傳送給官方帳號</p>
            <p class="tip-text">💡 只需要輸入六位數字即可，不需其他文字喔</p>
        </div>
    </div>

    <div class="step-item">
        <span class="step-num">3</span>
        <div class="step-content"><b>重新開啟網頁</b><p>驗證成功後，重新進入商店即可開始使用</p></div>
    </div>

    <button class="line-button" onclick="goToLine()">前往官方 LINE 帳號</button>
</div>

<div id="store-screen">
    <img id="p-img" class="product-img" src="" alt="商品圖片">
    <div class="product-content">
        <h1 id="p-name" style="margin:0; font-size:28px; color:#1a1a1a;"></h1>
        <p id="p-desc" style="color:#555; line-height:1.6; margin-top:15px; font-size:16px; white-space: pre-wrap;"></p>
        <div id="p-price" class="price"></div>
        <button class="buy-now" onclick="submitOrder()">喊單這裡請 (私訊 Line)</button>
    </div>
</div>

<script>
    // 您的專屬設定
    const LINE_ID_URL = "https://line.me/R/ti/p/@289vfrfc"; 
    // 已更新為您最新的試算表發佈網址
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLqUjFF71_PvFY0b3e65ywCAMlca8DhMSsFSI7KX5EN2ulhc60AixojY8ocI7eJ6BsxYvthxAviuVj/pub?output=csv";
    
    const randomCode = Math.floor(100000 + Math.random() * 900000);
    document.getElementById('displayCode').innerText = randomCode;

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id') || "001"; 

        if (!localStorage.getItem('mine_auth_passed')) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
            return;
        }

        try {
            const response = await fetch(SHEET_CSV_URL);
            const csvText = await response.text();
            const rows = csvText.split('\n').map(row => {
                // 處理 CSV 逗號問題的簡易解析
                return row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            });
            
            // 尋找對應 ID 的商品 (比對第一欄)
            const product = rows.find(r => r && r[0].replace(/"/g, '').trim() === itemId);
            
            if (product) {
                document.getElementById('p-name').innerText = product[2].replace(/"/g, ''); 
                document.getElementById('p-desc').innerText = product[3].replace(/"/g, '').replace(/\\n/g, '\n'); 
                document.getElementById('p-price').innerText = "NT$ " + product[4].replace(/"/g, ''); 
                document.getElementById('p-img').src = product[5].replace(/"/g, ''); 
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('store-screen').style.display = 'block';
            } else {
                document.getElementById('loading').innerText = "找不到商品 ID: " + itemId + "，請檢查後台試算表。";
            }
        } catch (e) {
            console.error(e);
            document.getElementById('loading').innerText = "連線失敗，請確保試算表已「發佈到網路」。";
        }
    }

    function copyCode() {
        navigator.clipboard.writeText(randomCode);
        alert('驗證碼已複製：' + randomCode);
    }

    function goToLine() {
        window.open(`${LINE_ID_URL}`, '_blank');
        setTimeout(() => {
            if(confirm("您是否已在 LINE 發送驗證碼？點擊確定即可開始購物。")) {
                localStorage.setItem('mine_auth_passed', 'true');
                location.reload();
            }
        }, 1500);
    }

    function submitOrder() {
        const name = document.getElementById('p-name').innerText;
        window.location.href = `https://line.me/R/oaMessage/@289vfrfc/?我要購買：${name}`;
    }

    init();
</script>
</body>
</html>
