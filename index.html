<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine買買Mine - 帳號實名驗證</title>
    <style>
        :root { --line-green: #06C755; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fff; color: #333; }
        #auth-screen { padding: 40px 20px; display: flex; flex-direction: column; min-height: 100vh; box-sizing: border-box; }
        .title { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .desc { color: #888; margin-bottom: 30px; line-height: 1.5; }
        .verify-box { background: #f9f9f9; border: 2px dashed #ddd; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 30px; }
        .code { font-size: 32px; font-weight: bold; color: #5856D6; letter-spacing: 2px; }
        .btn { display: block; width: 100%; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: bold; text-align: center; text-decoration: none; border: none; cursor: pointer; margin-bottom: 15px; }
        .line-btn { background: var(--line-green); color: white; }
        .enter-btn { background: #000; color: white; display: none; } /* 初始隱藏，點過LINE才出現 */
        #store-screen { display: none; max-width: 600px; margin: 0 auto; }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #f5f5f5; }
        .product-content { padding: 20px; }
        .price { color: #d0021b; font-size: 30px; font-weight: bold; margin: 15px 0; }
        #loading { text-align: center; padding: 50px; color: #999; display: none; }
    </style>
</head>
<body>

<div id="loading">載入商品資料中...</div>

<div id="auth-screen">
    <div class="title">實名帳號驗證</div>
    <div class="desc">為確認您的 LINE 帳號以進行後續下單，請完成以下步驟：</div>
    
    <div class="verify-box">
        <div style="font-size: 14px; color: #999; margin-bottom: 10px;">您的專屬驗證碼</div>
        <div class="code" id="myCode">------</div>
    </div>

    <div style="margin-bottom: 20px;">
        <p><b>1. 複製驗證碼並私訊</b><br><span style="font-size:14px; color:#888;">點擊下方按鈕前往官方 LINE</span></p>
    </div>

    <a href="https://line.me/R/ti/p/@289vfrfc" id="lineLink" class="btn line-btn" target="_blank" onclick="showEnterBtn()">前往官方 LINE 並發送代碼</a>
    
    <button id="enterBtn" class="btn enter-btn" onclick="passAuth()">我已發送驗證碼，進入商店</button>
</div>

<div id="store-screen">
    <img id="p-img" class="product-img" src="">
    <div class="product-content">
        <h1 id="p-name"></h1>
        <p id="p-desc" style="white-space: pre-wrap; color: #444; line-height: 1.6;"></p>
        <div id="p-price" class="price"></div>
        <button class="btn" style="background:#333; color:white;" onclick="submitOrder()">喊單這裡請 (私訊私訊)</button>
    </div>
</div>

<script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLqUjFF71_PvFY0b3e65ywCAMlca8DhMSsFSI7KX5EN2ulhc60AixojY8ocI7eJ6BsxYvthxAviuVj/pub?output=csv";
    const randomCode = Math.floor(100000 + Math.random() * 900000);
    document.getElementById('myCode').innerText = randomCode;

    function showEnterBtn() {
        // 客人點了 LINE 之後，才會秀出進入商店的按鈕
        document.getElementById('enterBtn').style.display = 'block';
        alert("請在 LINE 私訊輸入驗證碼 " + randomCode + " 之後，回到此頁面點擊「進入商店」");
    }

    function passAuth() {
        localStorage.setItem('mine_verified', 'true');
        location.reload();
    }

    async function init() {
        if (!localStorage.getItem('mine_verified')) {
            document.getElementById('auth-screen').style.display = 'flex';
            return;
        }

        document.getElementById('loading').style.display = 'block';
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id') || "001";

        try {
            const response = await fetch(SHEET_CSV_URL);
            const csvText = await response.text();
            const rows = csvText.split('\n').map(row => row.split(',').map(c => c.replace(/^["']|["']$/g, '').trim()));
            const product = rows.find(r => r[0] === itemId);
            
            if (product) {
                document.getElementById('p-name').innerText = product[2];
                document.getElementById('p-desc').innerText = product[3].replace(/\\n/g, '\n');
                document.getElementById('p-price').innerText = "NT$ " + product[4];
                document.getElementById('p-img').src = product[5];
                document.getElementById('store-screen').style.display = 'block';
            } else {
                alert("找不到商品 ID: " + itemId);
            }
        } catch (e) {
            alert("讀取失敗，請確認試算表已發佈為 CSV 格式");
        }
        document.getElementById('loading').style.display = 'none';
    }

    function submitOrder() {
        const name = document.getElementById('p-name').innerText;
        window.location.href = `https://line.me/R/oaMessage/@289vfrfc/?我要下單商品：${name}`;
    }

    init();
</script>
</body>
</html>
